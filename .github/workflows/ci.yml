name: CI

# This repo is a collection of skill definitions (Markdown) plus Bash helpers
# in scripts/. There is no Node code, no package.json, no lockfile. The
# previous CI was a leftover Node template that immediately failed on every
# branch touching scripts/*.sh because actions/setup-node@v4 with cache:'npm'
# requires a lockfile to compute its cache key.
#
# Current CI: shellcheck the scripts and run the existing bats / regression
# tests under tests/. That's it. If JS/TS ever lands here, add a Node job
# back — but only with a real lockfile in the repo.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  shell-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Pin shellcheck + bats to known versions instead of whatever
      # ubuntu-latest happens to ship — version drift on the runner
      # could silently change CI behavior (new SC checks firing, bats
      # output format changes, etc.). Bumping these is now an explicit
      # PR rather than a surprise.
      - name: Install shellcheck (pinned)
        run: |
          SHELLCHECK_VERSION=v0.11.0
          wget -qO- "https://github.com/koalaman/shellcheck/releases/download/${SHELLCHECK_VERSION}/shellcheck-${SHELLCHECK_VERSION}.linux.x86_64.tar.xz" | tar -xJ
          sudo mv "shellcheck-${SHELLCHECK_VERSION}/shellcheck" /usr/local/bin/
          shellcheck --version

      - name: Install bats (pinned)
        run: |
          BATS_VERSION=1.13.0
          git clone --depth 1 --branch "v${BATS_VERSION}" https://github.com/bats-core/bats-core.git /tmp/bats-core
          sudo /tmp/bats-core/install.sh /usr/local
          bats --version

      # -S error matches the previous shell-validation job's gate: stylistic
      # warnings (SC2034/SC2086) on existing scripts are pre-existing noise;
      # tighten later if/when those get cleaned up.
      - name: Run shellcheck
        run: |
          if compgen -G 'scripts/*.sh' > /dev/null; then
            shellcheck -S error scripts/*.sh
          else
            echo "No shell scripts to check."
          fi

      # normalize-memory-frontmatter.sh uses python3 + PyYAML for its --apply
      # validation gate, which the contract tests exercise. ubuntu-latest usually
      # ships PyYAML, but make it explicit so a runner-image change can't silently
      # skip the validation path. Only install when it's genuinely missing.
      - name: Ensure PyYAML (for normalize-frontmatter tests)
        run: |
          python3 -c 'import yaml' 2>/dev/null || { sudo apt-get update && sudo apt-get install -y python3-yaml; }

      # The live-game QR test (tests/live-game/qr.bats) diffs the offline encoder
      # bit-for-bit against `qrencode` and round-trips its output through `zbarimg`.
      # Install both so CI actually runs the foreign-oracle gate (the bats test
      # skips LOUDLY if they're missing, but we want it RUN in CI, not skipped).
      - name: Install qrencode + zbar (for the QR encoder oracle tests)
        run: sudo apt-get update && sudo apt-get install -y qrencode zbar-tools

      # Guard the test harness itself BEFORE trusting it. bats runs bodies under
      # `set -eET`, but the `[[ ]]` keyword and `!`-inverted commands are exempt
      # from errexit — a false one that isn't a test's last command is silently
      # swallowed, so the suite passes green while its assertion is a lie. The
      # lint enforces the `|| fail` idiom so a green run is real evidence.
      # See tests/helpers.bash + scripts/lint-bats-assertions.sh.
      - name: Lint bats assertions (enforce the || fail guard)
        run: bash scripts/lint-bats-assertions.sh tests

      # Run EVERY suite, recursively. The previous per-suite steps enumerated
      # suites by hand and silently OMITTED two that existed but never ran in CI
      # (heal-memory-dir, live-game). `bats -r` can't drop a suite — a new
      # tests/<name>/*.bats is picked up automatically, no CI edit required.
      - name: Run all bats suites
        run: bats -r tests

      # Non-bats regression check (a plain bash script, not a .bats file, so the
      # recursive bats run above does not cover it).
      - name: Run eval-tally regression test
        run: |
          if [ -f tests/eval-tally/run.sh ]; then
            bash tests/eval-tally/run.sh
          else
            echo "No eval-tally regression test."
          fi

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Tesla, the Arc-Prophet — the coil resonates until the current arcs to ground -->
  <defs>
    <radialGradient id="bg" cx="50%" cy="36%" r="82%">
      <stop offset="0%" stop-color="#190a2e"/>
      <stop offset="60%" stop-color="#0e0619"/>
      <stop offset="100%" stop-color="#07030d"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="14" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1024" height="1024" fill="url(#bg)"/>
  <circle cx="512" cy="512" r="484" fill="none" stroke="#9D6BFF55" stroke-width="10"/>
  <g filter="url(#glow)">
    <!-- the coil: stacked windings -->
    <g stroke="#B08CFF" stroke-width="24" stroke-linecap="round" fill="none">
      <path d="M 380 740 Q 512 700 644 740"/>
      <path d="M 380 660 Q 512 620 644 660"/>
      <path d="M 380 580 Q 512 540 644 580"/>
      <path d="M 380 500 Q 512 460 644 500"/>
    </g>
    <!-- toroid crown -->
    <ellipse cx="512" cy="400" rx="190" ry="56" fill="none" stroke="#C9AEFF" stroke-width="26"/>
    <!-- the arc: the prophecy discharging -->
    <path d="M 512 344 L 452 250 L 540 232 L 470 128"
          fill="none" stroke="#EFE3FF" stroke-width="26" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- 3 · 6 · 9 -->
    <circle cx="300" cy="260" r="16" fill="#C9AEFF"/>
    <circle cx="726" cy="238" r="16" fill="#C9AEFF"/>
    <circle cx="770" cy="360" r="16" fill="#C9AEFF"/>
  </g>
</svg>
